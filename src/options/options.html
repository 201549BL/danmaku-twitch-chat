<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danmaku Twitch Chat - Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="container">
      <h1>Danmaku Twitch Chat</h1>
      <p class="subtitle">Configure your horizontal chat overlay</p>

      <section class="settings-group">
        <h2>General</h2>

        <label class="setting">
          <span class="setting-label">Enable overlay</span>
          <input type="checkbox" id="enabled" />
        </label>

        <label class="setting">
          <span class="setting-label">Show only in fullscreen</span>
          <input type="checkbox" id="fullscreenOnly" />
        </label>

        <label class="setting">
          <span class="setting-label">Show usernames</span>
          <input type="checkbox" id="showUsernames" />
        </label>
      </section>

      <section class="settings-group">
        <h2>Appearance</h2>

        <label class="setting">
          <span class="setting-label">Font size (px)</span>
          <input type="number" id="fontSize" min="12" max="48" />
        </label>

        <label class="setting">
          <span class="setting-label">Number of rows</span>
          <input type="number" id="rows" min="1" max="10" />
        </label>

        <label class="setting">
          <span class="setting-label">Region top (%)</span>
          <input type="number" id="regionTop" min="0" max="100" />
        </label>

        <label class="setting">
          <span class="setting-label">Region height (%)</span>
          <input type="number" id="regionHeight" min="5" max="100" />
        </label>

        <label class="setting">
          <span class="setting-label">Opacity</span>
          <input type="range" id="opacity" min="0.1" max="1" step="0.1" />
          <span id="opacityValue">90%</span>
        </label>
      </section>

      <section class="settings-group">
        <h2>Animation</h2>

        <label class="setting">
          <span class="setting-label">Duration (seconds)</span>
          <input type="number" id="duration" min="3" max="30" />
        </label>

        <label class="setting">
          <span class="setting-label">Max messages per second</span>
          <input type="number" id="maxMessagesPerSecond" min="1" max="20" />
        </label>

        <label class="setting">
          <span class="setting-label">Max message length</span>
          <input type="number" id="maxMessageLength" min="20" max="500" />
        </label>
      </section>

      <div class="actions">
        <button id="save" class="primary">Save Settings</button>
        <button id="reset">Reset to Defaults</button>
      </div>

      <p class="status" id="status"></p>
    </div>

    <script src="../shared/constants.js"></script>
    <script src="options.js"></script>
  </body>
</html>
